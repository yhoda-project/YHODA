repos:
  # ---------------------------------------------------------------------------
  # File hygiene — catches trivial issues before CI sees them
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml          # validates prefect.yaml, ci.yml, this file
      - id: check-toml          # validates pyproject.toml
      - id: check-merge-conflict
      - id: debug-statements    # catches breakpoint() / import pdb left in
      - id: check-added-large-files
        args: [--maxkb=500]     # guard against accidentally staging a CSV

  # ---------------------------------------------------------------------------
  # Ruff — lint + format (mirrors CI: ruff check / ruff format --check)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Mypy — type check (mirrors CI: mypy src/)
  # Uses pre-commit's managed environment so uv does not need to be on PATH.
  # additional_dependencies supplies the packages mypy must resolve:
  #   - sqlalchemy[mypy] for the mypy plugin declared in pyproject.toml
  #   - types-requests for the requests stubs used in extract tasks
  #   - pydantic-settings for inline types used in config.py
  # Everything else (prefect, pandas, …) is covered by ignore_missing_imports=true
  # in pyproject.toml.
  # pass_filenames: false so mypy checks all of src/ together (cross-file types).
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [src/]
        additional_dependencies:
          - "sqlalchemy[mypy]>=2.0,<3.0"
          - "types-requests>=2.31"
          - "pydantic-settings>=2.0,<3.0"
          - "prefect>=3.0,<4.0"
        pass_filenames: false
